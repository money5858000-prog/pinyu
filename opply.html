<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品祐租賃 - 快速申請預審</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #0f172a; 
            background-image: radial-gradient(circle at top right, rgba(202, 138, 4, 0.05), transparent);
        }
        .form-card { 
            background: #1e293b; 
            border: 1px solid rgba(250, 204, 21, 0.1); 
            border-radius: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
        }
        .gold-text {
            background: linear-gradient(135deg, #fde047 0%, #fbbf24 50%, #ca8a04 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        input, select, textarea {
            background: #0f172a !important;
            border: 1px solid #334155 !important;
            color: white !important;
        }
        input:focus { border-color: #ca8a04 !important; }
    </style>
</head>
<body class="py-12 px-4 text-slate-200">
    <div class="max-w-md mx-auto">
        <!-- 修正後的返回連結：確保指向 index.html -->
        <a href="./index.html" class="inline-flex items-center text-slate-400 hover:text-yellow-500 mb-8 transition font-bold group">
            <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 返回品祐首頁
        </a>

        <!-- Logo Area - 點擊 Logo 也能回首頁 -->
        <div class="text-center mb-10">
            <a href="./index.html" class="inline-block p-4 bg-yellow-500/10 rounded-3xl mb-4 hover:bg-yellow-500/20 transition">
                <i class="fas fa-file-invoice-dollar text-4xl text-yellow-500"></i>
            </a>
            <h1 class="text-3xl font-black gold-text">案件預審申請單</h1>
            <p class="text-slate-500 text-sm mt-2 font-medium">請填寫基本資料，黃俊經理將儘速回覆</p>
        </div>

        <!-- Form Card -->
        <div class="form-card p-8 md:p-10">
            <form id="applyForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 ml-1">客戶姓名 / 稱呼</label>
                    <input type="text" id="name" placeholder="例如：林先生" class="w-full rounded-2xl p-4 outline-none transition shadow-inner">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 ml-1">聯絡電話</label>
                    <input type="tel" id="phone" placeholder="09XX-XXX-XXX" class="w-full rounded-2xl p-4 outline-none transition shadow-inner">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 ml-1">預計貸款金額</label>
                    <select id="amount" class="w-full rounded-2xl p-4 outline-none transition cursor-pointer">
                        <option>20萬以下</option>
                        <option selected>20萬 - 50萬</option>
                        <option>50萬 - 100萬</option>
                        <option>100萬以上</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 ml-1">職業與收入狀況</label>
                    <textarea id="job" placeholder="例如：領現無勞保、自營商、上班族..." rows="3" class="w-full rounded-2xl p-4 outline-none transition resize-none shadow-inner"></textarea>
                </div>
                
                <div class="pt-4">
                    <button type="button" onclick="handleSubmit()" class="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 text-slate-900 font-black py-5 rounded-2xl hover:brightness-110 transition transform active:scale-95 shadow-xl shadow-yellow-500/10 text-lg">
                        確認送出並聯絡黃俊
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-12 text-center">
            <div class="flex justify-center items-center gap-2 text-slate-600 mb-2">
                <i class="fas fa-shield-alt text-xs"></i>
                <span class="text-[10px] font-bold tracking-widest uppercase">Encrypted & Secured</span>
            </div>
            <p class="text-[10px] text-slate-600 leading-relaxed">
                您的資料僅供案件評估使用，品祐租賃嚴格遵守個資法相關規定，絕不外洩給第三方。
            </p>
        </div>
    </div>

    <script>
        function handleSubmit() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const amount = document.getElementById('amount').value;
            const job = document.getElementById('job').value;

            // 組合初步訊息
            const message = `您好，我想申請預審單：%0A姓名：${name}%0A電話：${phone}%0A金額：${amount}%0A狀況：${job}`;
            const lineUrl = `https://line.me/R/ti/p/~p8957p?text=${message}`;
            
            const btn = document.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';
            
            setTimeout(() => {
                window.location.href = lineUrl;
            }, 500);
        }
    </script>
</body>
</html>
